<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trailer Popup</title>
    <link rel="stylesheet" href="video-trailer-popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="movie-container">
        <img src = "https://images.pexels.com/photos/1117132/pexels-photo-1117132.jpeg" alt="movie-image">
        <h1>Movie Title</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur officiis repudiandae quod, illo nostrum amet consequuntur velit, vero quibusdam odit cum esse, unde iste aperiam ullam accusamus aut molestiae autem.</p>
        <button class = "btn">Watch Now</button>
    </div>
    <div class = "trailer-container active">
        <video src = "trailer.mp4" controls></video>
        <i class="fa-solid fa-xmark fa-2x close-icon"></i>
    </div>
    <script src="video-trailer-popup.js"></script>
</body>
</html>
